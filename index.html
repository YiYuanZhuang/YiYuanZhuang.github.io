<!DOCTYPE html>
<html>
<head>
	<title>My Web Page</title>
	<style>
		body {
			margin: 0;
			padding: 0;
		}
		.container {
			position: relative;
		}
		img {
			display: block;
			max-width: 100%;
			height: auto;
		}
		.controls {
			position: absolute;
			bottom: 0;
			right: 0;
			margin: 10px;
		}
	</style>
</head>
<body>
	<div class="container">
		<img src="{{ url_for('static', filename='sunset.jpg') }}" alt="My Image">
		<div class="controls">
			<audio controls>
			  <source src="{{ url_for('static', filename='meet.m4a') }}" type="audio/mpeg">
			  Your browser does not support the audio element.
			</audio>
		</div>
	</div>
</body>
</html>
